#!2026-02-18.1
#!raw=https://raw.githubusercontent.com/jianh-ai/klax/main/conf/conf.yaml
#!raw=https://cdn.jsdelivr.net/gh/jianh-ai/klax@main/conf/conf.yaml
#!raw=https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/conf/conf.yaml

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true
keep-alive-interval: 30
find-process-mode: strict
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true

# 订阅引用
use: &use
  type: select
  use:
    - provider1
    - provider2

# 远程订阅
proxy-providers:
  # 良心云
  provider1:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=73bb950db23f5eebba92b8bc615e9fee"
    interval: 86400
    path: ./provider1.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  # kitty 
  provider2:
    type: http
    url: "https://2.luolicon.ru/oosaka/930fdefef8c7a47c195b81e5797d5c07"
    interval: 86400
    path: ./provider2.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  ipv6: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.4.4
    - 1.1.1.1
    - system
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - localhost.ptlogin2.qq.com
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://doh.dns.sb/dns-query
    - https://dns.cloudflare.com/dns-query
    - tls://8.8.4.4
    - tls://1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:
# 代理面板
proxy-groups:
  # 代理命名
  # 地区节点
  # 自动选择
  - name: 香港自动
    type: url-test
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/HongKong.png
    <<: *use
    filter: 港|🇭🇰|HK|(?i)Hong
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 狮城自动
    type: url-test
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Singapore.png
    <<: *use
    filter: 新|🇸🇬|狮|SG|(?i)Singapore
    url: http://www.gstatic.com/generate_204
    interval: 300
      
  - name: 日本自动
    type: url-test
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Japan.png
    <<: *use
    filter: 日|东京|🇯🇵|JP|(?i)Japan
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 美国自动
    type: url-test
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/UnitedStates.png
    <<: *use
    filter: 美|洛杉矶|🇺🇸|US|(?i)States|American
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 台湾自动
    type: url-test
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/TaiWan.png
    <<: *use
    filter: 台|🇨🇳|🇹🇼|TW|(?i)Taiwan
    url: http://www.gstatic.com/generate_204
    interval: 300

  # 手动切换
  - name: 香港手动
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/HongKong.png
    <<: *use
    filter: 港|🇭🇰|HK|(?i)Hong

  - name: 狮城手动
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Singapore.png
    <<: *use
    filter: 新|🇸🇬|狮|SG|(?i)Singapore
      
  - name: 日本手动
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Japan.png
    <<: *use
    filter: 日|东京|🇯🇵|JP|(?i)Japan

  - name: 美国手动
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/UnitedStates.png
    <<: *use
    filter: 美|洛杉矶|🇺🇸|US|(?i)States|American

  - name: 台湾手动
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/TaiWan.png
    <<: *use
    filter: 台|🇨🇳|🇹🇼|TW|(?i)Taiwan

  # 分流节点
  - name: ChatGPT
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/ChatGPT.png
    proxies:
      - 狮城自动
      - 日本自动
      - 美国自动

  - name: TikTok
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/TikTok.png
    proxies:
      - 狮城自动
      - 日本自动
      - 美国自动
      - 狮城手动
      - 日本手动
      - 美国手动

  - name: Twitter
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Twitter.png
    proxies:
      - 香港自动
      - 狮城自动
      - 日本自动
      - 美国自动
      - 香港手动
      - 狮城手动
      - 日本手动
      - 美国手动

  - name: 哔哩哔哩
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Bilibili.png
    proxies:
      - DIRECT
      - 香港自动
      - 台湾自动
      - 香港手动
      - 台湾手动

  - name: 苹果服务
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Apple.png
    proxies:
      - DIRECT
      - 日本自动
      - 美国自动

  - name: Google
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Google.png
    proxies:
      - 香港自动
      - 狮城自动
      - 日本自动
      - 美国自动
      - 香港手动
      - 狮城手动
      - 日本手动
      - 美国手动

  - name: 国内网站
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Domestic.png
    proxies:
      - DIRECT

  - name: 兜底分流
    type: select
    icon: https://cdn.jsdmirror.com/gh/jianh-ai/klax@main/icon/Final.png
    proxies:
      - 香港自动
      - 狮城自动
      - 日本自动
      - 美国自动
      - 台湾自动
      - DIRECT
     
# 规则集
rule-providers:
  # 规则集命名
  18comic:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/18comic.list"
    path: ./ruleset/18comic.list
    interval: 86400

  adblock:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml"
    path: ./ruleset/adblock.list
    interval: 86400

  Google:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/Google.list"
    path: ./ruleset/Google.list
    interval: 86400

  OpenAI:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/OpenAI.list"
    path: ./ruleset/OpenAI.list
    interval: 86400

  YoutubeMusic:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/YoutubeMusic.list"
    path: ./ruleset/YoutubeMusic.list
    interval: 86400

  regioncn:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/regioncn.list"
    path: ./ruleset/regioncn.list
    interval: 86400

  regionjp:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/jianh-ai/klax/main/rule/regionjp.list"
    path: ./ruleset/regionjp.list
    interval: 86400

# 规则集命名+代理命名
rules:
  - RULE-SET,18comic,REJECT,no-resolve
  - RULE-SET,adblock,REJECT,no-resolve
  - GEOSITE,apple,苹果服务,no-resolve
  - GEOSITE,bilibili,哔哩哔哩,no-resolve
  - GEOSITE,ehentai,美国自动,no-resolve
  - RULE-SET,OpenAI,ChatGPT,no-resolve
  - RULE-SET,Google,Google,no-resolve
  - GEOSITE,spotify,日本自动,no-resolve
  - GEOSITE,tiktok,TikTok,no-resolve
  - GEOSITE,twitter,Twitter,no-resolve
  - RULE-SET,YoutubeMusic,日本自动,no-resolve
  - RULE-SET,regioncn,国内网站,no-resolve
  - RULE-SET,regionjp,日本自动,no-resolve
  - GEOIP,JP,日本自动
  - GEOIP,Lan,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,兜底分流
